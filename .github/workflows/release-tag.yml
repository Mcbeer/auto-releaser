# Tag workflow: the ONLY tag writer. Fires when a release PR (branch release/*) is
# merged. Reads the version from the merged package.json and creates the tag +
# GitHub release. Detection is authoritative via the PR event (NOT commit-message
# heuristics): pull_request closed + merged == true + head.ref startsWith release/.
# See EXTENSIBILITY-DESIGN.md §5b.
name: release-tag

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Derive tagPrefix from the release branch name (release/<prefix>), then ask
      # the tool for that project's path (config is the single source of truth — no
      # hardcoded paths). Read the version from that project's package.json.
      - name: Resolve prefix + version
        id: meta
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          prefix="${HEAD_REF#release/}"
          project_path=$(node ./src/cli.ts resolve-path "$prefix" --repo-root "$GITHUB_WORKSPACE")
          version=$(node -p "require('./${project_path}/package.json').version")
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=${prefix}-v${version}" >> "$GITHUB_OUTPUT"

      - name: Create tag + release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --notes "Released by dep-aware-release."
