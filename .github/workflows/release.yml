# Push workflow: on merge to main, run the tool; if hasChanges, maintain a rolling
# release PR per project. The tool writes package.json + CHANGELOG.md; the
# create-pull-request action owns all PR state/idempotency (parent doc §4.2).
#
# RACE GUARD (see EXTENSIBILITY-DESIGN.md §5b): the release-PR merge also pushes to
# main. We must NOT run the tool on that release commit before its tag exists, or
# it computes a spurious extra bump. Guard: skip when HEAD is a chore(release)
# commit produced by this system. The tag workflow (release-tag.yml) handles that
# commit instead.
name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the release commit itself (the tag workflow owns it). This prevents the
    # push/tag race from producing a spurious bump.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags needed for "since last tag"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run dependency-aware release tool
        id: release
        run: node ./src/cli.ts --repo-root "$GITHUB_WORKSPACE"
        # emits hasChanges + <prefix>_version + <prefix>_notes to $GITHUB_OUTPUT

      # The rolling release PR. This action owns PR idempotency/concurrency — we do
      # not build that (parent doc §4.2). Branch name release/<prefix> is the signal
      # the tag workflow keys off.
      - name: Maintain rolling release PR
        if: ${{ steps.release.outputs.hasChanges == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: release/kc-bff
          title: "chore(release): kc-bff ${{ steps.release.outputs.kc-bff_version }}"
          body: ${{ steps.release.outputs.kc-bff_notes }}
          commit-message: "chore(release): kc-bff ${{ steps.release.outputs.kc-bff_version }}"
          labels: release
